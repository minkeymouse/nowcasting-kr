<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowcasting Application</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // Load and execute App.jsx
        fetch('/static/src/App.jsx')
            .then(response => response.text())
            .then(code => {
                // Use Babel to transform and execute the JSX code
                const transformed = Babel.transform(code, { presets: ['react'] }).code;
                eval(transformed);
            })
            .catch(error => {
                console.error('Failed to load App.jsx:', error);
                document.getElementById('root').innerHTML = '<div style="padding: 20px; color: red;">Failed to load application. Please check the console for errors.</div>';
            });
    </script>
</body>
</html>
