# Main Hydra configuration
# References series from config/series/default.yaml

defaults:
  - series: default
  - _self_

# DFM estimation parameters
dfm:
  clock: "m"  # Base frequency for all latent factors (monthly clock)
  threshold: 1e-5
  max_iter: 5000
  nan_method: 2
  nan_k: 3
  ar_lag: 1

# Model structure: block definitions
# NOTE: Block order must match CSV spec (CSV is source of truth)
# CSV order: Block_Global, Block_Consumption, Block_Invest, Block_Extern
model:
  blocks:
    Global:
      factors: 3
    Consumption:
      factors: 2
    Investment:  # Maps to CSV 'Block_Invest'
      factors: 2
    External:  # Maps to CSV 'Block_Extern'
      factors: 1
  
  # Optional: factors_per_block as list (auto-generated from blocks if null)
  factors_per_block: null  # Will be [1, 1, 1] from blocks above

# Data loading configuration
data:
  use_database: true
  strict_mode: false
  country: KR
  vintage: null
  vintage_old: null
  vintage_new: null
  sample_start: null
  config_id: null
  data_path: null
  forecast_periods: 2  # For nowcast_dfm.py: number of forward forecast periods

# Experiment metadata
experiment_name: default
output_dir: outputs


