# Main Hydra configuration
# References series from config/series/default.yaml

defaults:
  - series: test_series
  - _self_

# DFM estimation parameters
dfm:
  clock: "m"  # Base frequency for all latent factors (monthly clock)
  threshold: 1e-5
  max_iter: 100
  nan_method: 2
  nan_k: 3
  ar_lag: 1  # AR lag for all blocks (model-wise)
  
  # Numerical stability parameters (dfm-python 0.1.5+)
  # AR Coefficient Clipping
  clip_ar_coefficients: true
  ar_clip_min: -0.99
  ar_clip_max: 0.99
  warn_on_ar_clip: true
  
  # Data Value Clipping
  clip_data_values: true
  data_clip_threshold: 100.0
  warn_on_data_clip: true
  
  # Regularization
  use_regularization: true
  regularization_scale: 1e-6
  min_eigenvalue: 1e-8
  max_eigenvalue: 1e6
  warn_on_regularization: true
  
  # Damped Updates
  use_damped_updates: true
  damping_factor: 0.8
  warn_on_damped_update: true

# Model structure: block definitions
# NOTE: Block order must match CSV spec (CSV is source of truth)
# CSV order: Block_Global, Block_Consumption, Block_Invest, Block_Extern
model:
  blocks:
    Global:
      factors: 2
    Consumption:
      factors: 1
    Investment:  # Maps to CSV 'Block_Invest'
      factors: 1
    External:  # Maps to CSV 'Block_Extern'
      factors: 1
  
  # Optional: factors_per_block as list (auto-generated from blocks if null)
  factors_per_block: null  # Will be [1, 1, 1] from blocks above

# Data loading configuration
data:
  use_database: true
  strict_mode: false
  country: KR
  vintage: null
  vintage_old: null
  vintage_new: null
  sample_start: null
  config_id: null
  data_path: null
  forecast_periods: 2  # For nowcast_dfm.py: number of forward forecast periods

# Experiment metadata
experiment_name: default
output_dir: outputs

