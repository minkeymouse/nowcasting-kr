# Data loading configuration

# Use database for data (configs are in Hydra YAML)
use_database: true
country: KR

# Vintage selection (use latest if not specified)
vintage: null
# vintage_id: null  # Alternative: specify vintage_id directly

# Data filtering
sample_start: 2000-01-01  # Start date for training sample
start_date: null  # Optional: filter start date
end_date: null    # Optional: filter end date

# Error handling
strict_mode: false  # If true, raise error for missing series

# File-based fallback (for testing/backward compatibility)
# use_database: false
# vintage: 2016-06-29
# data_path: data/US/2016-06-29.xls
