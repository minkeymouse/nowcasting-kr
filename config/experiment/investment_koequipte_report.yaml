model_overrides:
  dfm:
    max_iter: 5000
    threshold: 1.0e-05
    clock: w
    mixed_freq: true
    scaler: robust
    blocks:
      block1:
        factors: 3
        ar_lag: 1
        clock: w
        series: []
  ddfm:
    epochs: 50  # Fast training and avoid overfitting
    encoder_layers:
    - 64
    - 32
    num_factors: 3
    activation: relu
    learning_rate: 0.005
    batch_size: 100
    decay_learning_rate: true
    min_obs_pretrain: 50
    mult_epoch_pretrain: 1
    scaler: robust
    clock: w
  arima:
    order:
    - 1
    - 1
    - 1
    auto_arima:
      enabled: false
  var:
    lag_order: 1
    trend: c
  tft:
    input_size: 96      # Lookback window (weeks) = 2 years
    hidden_size: 64
    n_head: 4
    dropout: 0.1
    learning_rate: 0.001
    max_epochs: 10  # Reduced epochs for faster training
    batch_size: 256  # Increased batch size for faster training (GPU has 32GB memory)
    num_workers: 0
    max_covariates: 50  # Limit covariates to avoid hanging (121 is too many)
    horizon: 24         # Forecast horizon (weeks) = 24 weeks per chunk for recursive prediction
    scaler: robust
  lstm:
    input_size: 96      # Lookback window (weeks) = 2 years
    hidden_size: 64
    num_layers: 2
    learning_rate: 0.001
    epochs: 50  # Fast training and avoid overfitting
    batch_size: 32
    horizon: 24         # Forecast horizon (weeks) = 24 weeks per chunk for recursive prediction
    scaler: robust
  deepar:
    input_size: 96      # Lookback window (weeks) = 2 years
    hidden_size: 64
    num_layers: 2
    dropout: 0.1
    learning_rate: 0.001
    epochs: 50  # Fast training and avoid overfitting
    batch_size: 32
    max_covariates: 50  # Limit covariates to avoid hanging (121 is too many)
    horizon: 24         # Forecast horizon (weeks) = 24 weeks per chunk for recursive prediction
    scaler: robust
  chronos:
    model_name: amazon/chronos-t5-tiny
    context_length: null
    prediction_length: 24  # 24 weeks (~6 months) - suitable horizon for Chronos pre-trained model
    scaler: robust
