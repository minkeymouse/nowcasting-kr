# Example DDFM (Deep Dynamic Factor Model) Configuration
# This configuration demonstrates all DDFM-specific parameters

# Standard DFM parameters
ar_lag: 1
threshold: 1e-5
max_iter: 5000
nan_method: 2
nan_k: 3
clock: 'm'

# DDFM-specific parameters
ddfm_encoder_layers: [64, 32, 16]  # Hidden layer dimensions for encoder
ddfm_num_factors: 2  # Number of factors (optional, inferred from blocks if None)
ddfm_activation: 'tanh'  # Activation function: 'tanh', 'relu', or 'sigmoid'
ddfm_use_batch_norm: true  # Use batch normalization in encoder
ddfm_learning_rate: 0.001  # Learning rate for Adam optimizer
ddfm_epochs: 100  # Number of training epochs
ddfm_batch_size: 32  # Batch size for training
ddfm_factor_order: 2  # VAR lag order for factor dynamics (1 or 2)
ddfm_use_idiosyncratic: true  # Model idiosyncratic components with AR(1) dynamics
ddfm_min_obs_idio: 5  # Minimum observations for idio AR(1) estimation

# Note: Series and blocks configuration should be provided separately
# via series config files or spec CSV, or merged with this config

