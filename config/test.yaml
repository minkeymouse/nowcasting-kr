# Main Hydra configuration
# References series from config/series/default.yaml

defaults:
  - series: test_series
  - _self_

# DFM estimation parameters
dfm:
  threshold: 1e-5
  max_iter: 100
  nan_method: 2
  nan_k: 3
  ar_lag: 1  # AR lag for all blocks (model-wise)

# Model structure: block definitions
model:
  # Block definitions with their factor dimensions
  blocks:
    Global:
      factors: 2
    Investment:
      factors: 1
    Consumption:
      factors: 1
  
  # Optional: factors_per_block as list (auto-generated from blocks if null)
  factors_per_block: null  # Will be [1, 1, 1] from blocks above

# Data loading configuration
data:
  use_database: true
  strict_mode: false
  country: KR
  vintage: null
  vintage_old: null
  vintage_new: null
  sample_start: null
  config_id: null
  data_path: null
  forecast_periods: 2  # For nowcast_dfm.py: number of forward forecast periods

# Experiment metadata
experiment_name: default
output_dir: outputs

