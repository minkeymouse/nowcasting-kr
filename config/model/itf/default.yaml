# iTransformer Configuration for Korean Macroeconomic Nowcasting
# Based on Korean economic indicators (KO* series)

# Model identification
name: itf

# Model-specific horizon (weeks)
horizon: 88

# Target series for forecasting
target_series:
  - KOEQUIPTE  # Investment, Equipment
  - KOWRCCNSE  # Consumption
  - KOIPALL.G  # Production, All

# Architecture Parameters
n_forecasts: 88  # Forecast horizon (should match horizon for direct prediction)
n_lags: 96  # Number of lagged time steps to use as input (context window)
d_model: 512  # Dimension of the model (embedding dimension)
n_heads: 8  # Number of attention heads in multi-head attention
e_layers: 2  # Number of encoder layers
d_layers: 1  # Number of decoder layers
d_ff: 2048  # Dimension of feed-forward network
dropout: 0.1  # Dropout rate for regularization
activation: gelu  # Activation function: 'gelu', 'relu', 'swish'

# Training Parameters
batch_size: 32  # Batch size for training
max_epochs: 10  # Maximum number of training epochs
learning_rate: 0.001  # Learning rate for optimizer (Adam)
