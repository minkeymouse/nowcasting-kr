# Korean DFM Model Configuration v1
# Full model specification with series, blocks, and transformations

block_names:
  - Global
  - Consumption
  - Investment
  - External

series:
  # GDP and Aggregate Demand
  - series_id: BOK_200Y001
    series_name: GDP Growth Rate
    frequency: q
    transformation: pch
    units: PCT
    category: GDP
    blocks: [1, 0, 0, 0]  # Global only
  
  # Consumption Indicators
  - series_id: BOK_200Y002
    series_name: Private Consumption Growth
    frequency: q
    transformation: pch
    units: PCT
    category: Consumption
    blocks: [1, 1, 0, 0]  # Global + Consumption
  
  - series_id: BOK_200Y003
    series_name: Retail Sales Index
    frequency: m
    transformation: pch
    units: PCT
    category: Consumption
    blocks: [1, 1, 0, 0]  # Global + Consumption
  
  - series_id: BOK_200Y004
    series_name: Consumer Confidence Index
    frequency: m
    transformation: lin
    units: INDEX
    category: Consumption
    blocks: [1, 1, 0, 0]  # Global + Consumption
  
  # Investment Indicators
  - series_id: BOK_200Y005
    series_name: Fixed Capital Formation Growth
    frequency: q
    transformation: pch
    units: PCT
    category: Investment
    blocks: [1, 0, 1, 0]  # Global + Investment
  
  - series_id: BOK_200Y006
    series_name: Machinery Orders
    frequency: m
    transformation: pch
    units: PCT
    category: Investment
    blocks: [1, 0, 1, 0]  # Global + Investment
  
  - series_id: BOK_200Y007
    series_name: Construction Investment
    frequency: m
    transformation: pch
    units: PCT
    category: Investment
    blocks: [1, 0, 1, 0]  # Global + Investment
  
  # External/Trade Indicators
  - series_id: BOK_200Y008
    series_name: Export Growth
    frequency: m
    transformation: pch
    units: PCT
    category: External
    blocks: [1, 0, 0, 1]  # Global + External
  
  - series_id: BOK_200Y009
    series_name: Import Growth
    frequency: m
    transformation: pch
    units: PCT
    category: External
    blocks: [1, 0, 0, 1]  # Global + External
  
  - series_id: BOK_200Y010
    series_name: Trade Balance
    frequency: m
    transformation: lin
    units: USD_MIL
    category: External
    blocks: [1, 0, 0, 1]  # Global + External
  
  # Labor Market
  - series_id: BOK_200Y011
    series_name: Unemployment Rate
    frequency: m
    transformation: lin
    units: PCT
    category: Labor
    blocks: [1, 0, 0, 0]  # Global only
  
  # Price Indicators
  - series_id: BOK_200Y012
    series_name: CPI Inflation
    frequency: m
    transformation: pch
    units: PCT
    category: Prices
    blocks: [1, 0, 0, 0]  # Global only
  
  - series_id: BOK_200Y013
    series_name: PPI Inflation
    frequency: m
    transformation: pch
    units: PCT
    category: Prices
    blocks: [1, 0, 0, 0]  # Global only
  
  # Financial Indicators
  - series_id: BOK_200Y014
    series_name: Stock Price Index
    frequency: m
    transformation: pch
    units: PCT
    category: Financial
    blocks: [1, 0, 0, 0]  # Global only
  
  - series_id: BOK_200Y015
    series_name: Exchange Rate (KRW/USD)
    frequency: m
    transformation: pch
    units: PCT
    category: Financial
    blocks: [1, 0, 0, 1]  # Global + External (trade affects FX)
