# TFT (Temporal Fusion Transformer) Configuration for Korean Macroeconomic Nowcasting

# Model identification
name: tft

# Model-specific horizon (weeks)
horizon: 88

# Target series for forecasting
target_series:
  - KOEQUIPTE  # Investment, Equipment
  - KOWRCCNSE  # Consumption
  - KOIPALL.G  # Production, All

# Architecture Parameters
prediction_length: 88  # Forecast horizon (should match horizon for direct prediction)
context_length: 96  # Context window length (number of past time steps)
hidden_size: 64  # Hidden dimension for LSTM and attention layers
num_heads: 4  # Number of attention heads in multi-head attention
dropout: 0.1  # Dropout rate for regularization
max_covariates: 50  # Maximum number of covariates to use (for variable selection)

# Training Parameters
batch_size: 256  # Batch size for training (TFT typically uses larger batches)
max_epochs: 10  # Maximum number of training epochs
learning_rate: 0.001  # Learning rate for optimizer (Adam)
