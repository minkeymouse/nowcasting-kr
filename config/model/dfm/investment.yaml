name: dfm
horizon: 1  # Short-term: 1 week ahead. For long-term experiments, override with 40 (max horizon: 40 weeks)
# Note: DFM doesn't use prediction_length - model structure defines forecast dynamics
# For long-term experiments, model can predict all horizons (4w-40w) from single trained model
ar_lag: 4
ar_order: 4
threshold: 1.0e-03
max_iter: 3
clip_ar_coefficients: true
ar_clip_min: -0.99
ar_clip_max: 0.99
use_regularization: true
regularization_scale: 5.0e-06
# augment_idio and augment_idio_slow are auto-detected from frequency configuration
# (removed from config - always set automatically based on mixed-frequency detection)
idio_rho0: 0.1
idio_min_var: 1.0e-08
clock: w
mixed_freq: true
scaler: standard
# Tent weights for mixed-frequency aggregation
# 5-period tent kernel for monthly->weekly aggregation
tent_weights:
  m:w: [1, 2, 3, 2, 1]  # Investment dataset uses 5-period tent kernel
blocks:
  Block_Global:
    num_factors: 7
    series:
    - A001
    - GSCITOT
    - KOBDY10
    - KOBFINAAF
    - KOBSESI.R
    - KOBSIBCOQ
    - KOBSIIMER
    - KOBSIIMPR
    - KOBUSINVR
    - KOCBNG3
    - KOCNFCONR
    - KOCOBUSIR
    - KOCONPMTH
    - KOCONSTRP
