# DFM Configuration - Shared Parameters
# Base configuration for all DFM models (investment, consumption, production)
# Data-type specific overrides are in investment.yaml, consumption.yaml, production.yaml

# Model identification
name: dfm

# EM Algorithm Parameters
ar_lag: 4  # Global AR lag order (factor lag 4 for inter-factor lagged correlation, as in documentation)
ar_order: 4  # Alias for ar_lag
threshold: 1.0e-05  # EM convergence threshold
max_iter: 5000  # Maximum EM iterations

# Numerical Stability Parameters
clip_ar_coefficients: true
ar_clip_min: -0.99
ar_clip_max: 0.99
use_regularization: true
regularization_scale: 1.0e-05

# Idiosyncratic Component Parameters
augment_idio: false  # Disabled to reduce memory usage with weekly clock + monthly series
augment_idio_slow: false
idio_rho0: 0.1
idio_min_var: 1.0e-08

# Data Handling
clock: w  # Weekly clock frequency (base frequency for latent factors)
mixed_freq: true  # Enable mixed frequency support
scaler: robust  # Scaler type (data is preprocessed, this is for reference)

