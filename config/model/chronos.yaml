# Chronos forecaster model configuration
# Chronos is a pre-trained foundation model from Amazon for time series forecasting

# Model selection
# Available models (from smallest to largest):
# - chronos-t5-tiny: ~8M parameters, fastest
# - chronos-t5-mini: ~20M parameters
# - chronos-t5-small: ~46M parameters
# - chronos-t5-base: ~200M parameters
# - chronos-t5-large: ~710M parameters (largest, slowest)
model_name: amazon/chronos-t5-tiny  # Use tiny for faster training, can upgrade to larger models

# Context and prediction length
# If None, uses model defaults
context_length: null      # Maximum context length (None = use model default)
prediction_length: 24     # Prediction length in weeks (24 weeks = ~6 months, used for recursive prediction)

# Data preprocessing
scaler: robust          # robust, standard, or null
