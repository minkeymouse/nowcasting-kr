[project]
name = "nowcasting-kr"
version = "0.1.0"
description = "Korean macroeconomic nowcasting system using Dynamic Factor Models"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "Nowcasting KR Contributors"}
]
keywords = ["nowcasting", "forecasting", "korea", "macroeconomic", "dfm"]
dependencies = [
    "dfm-python>=0.1.2",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scipy>=1.10.0",
]

[project.optional-dependencies]
hydra = [
    "hydra-core>=1.3.0",
    "omegaconf>=2.3.0",
]
dev = [
    "pytest>=7.0.0",
]
database = [
    "supabase>=2.0.0",
    "psycopg2-binary>=2.9.0",
    "pydantic-settings>=2.11.0",
    "httpx>=0.24.0",
]
all = [
    "dfm-python[hydra,database,dev]",
]

[project.urls]
Homepage = "https://github.com/minkeymouse/nowcasting-kr"
Documentation = "https://github.com/minkeymouse/nowcasting-kr#readme"
Repository = "https://github.com/minkeymouse/nowcasting-kr"
Issues = "https://github.com/minkeymouse/nowcasting-kr/issues"
