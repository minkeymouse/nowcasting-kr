[project]
name = "macro_nowcasting_kr"
version = "0.1.0"
description = "python version of FRBNY's nowcasting repo"
requires-python = ">=3.12"
dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scipy>=1.10.0",
    "openpyxl>=3.1.0",
    "xlrd>=2.0.0",
    "pydantic>=2.0.0",
    "hydra-core>=1.3.0",
    "omegaconf>=2.3.0",
    "supabase>=2.0.0",
    "psycopg2-binary>=2.9.0",
    "pydantic-settings>=2.11.0",
    "httpx>=0.24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
