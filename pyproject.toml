[project]
name = "nowcasting-kr"
version = "0.1.0"
description = "Korean macroeconomic nowcasting system using Dynamic Factor Models"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "Nowcasting KR Contributors"}
]
keywords = ["nowcasting", "forecasting", "korea", "macroeconomic", "dfm"]
dependencies = [
    "dfm-python>=0.1.0",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scipy>=1.10.0",
]

[project.optional-dependencies]
hydra = [
    "hydra-core>=1.3.0",
    "omegaconf>=2.3.0",
]
dev = [
    "pytest>=7.0.0",
]
database = [
    "supabase>=2.0.0",
    "psycopg2-binary>=2.9.0",
    "pydantic-settings>=2.11.0",
    "httpx>=0.24.0",
]
all = [
    "dfm-python[hydra,database,dev]",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# Application-specific code only (adapters, database, scripts, etc.)
# DFM module is now installed from PyPI as dfm-python
packages = ["adapters", "database", "scripts"]

[project.urls]
Homepage = "https://github.com/yourusername/dfm-python"
Documentation = "https://github.com/yourusername/dfm-python#readme"
Repository = "https://github.com/yourusername/dfm-python"
Issues = "https://github.com/yourusername/dfm-python/issues"
