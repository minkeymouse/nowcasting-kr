name: Full Pipeline

on:
  workflow_dispatch:
    inputs:
      config_name:
        description: 'Hydra config name (e.g., default, test)'
        required: false
        default: 'default'
        type: string
      series_config:
        description: 'Series config name (e.g., default, test_series)'
        required: false
        default: 'default'
        type: string
      max_iter:
        description: 'Maximum EM iterations for training'
        required: false
        default: '100'
        type: string
  push:
    paths:
      - 'scripts/ingest_api.py'
      - 'scripts/train_dfm.py'
      - 'scripts/nowcast_dfm.py'
      - 'src/spec/**/*.csv'
      - 'config/**/*.yaml'
    branches:
      - main
      - master

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e .[database]
          uv pip install supabase>=2.0.0 psycopg2-binary>=2.9.0 httpx>=0.24.0
      
      - name: Load environment variables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          BOK_API_KEY: ${{ secrets.BOK_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" >> $GITHUB_ENV
          echo "SUPABASE_SECRET_KEY=$SUPABASE_SECRET_KEY" >> $GITHUB_ENV
          echo "BOK_API_KEY=$BOK_API_KEY" >> $GITHUB_ENV
          echo "KOSIS_API_KEY=$KOSIS_API_KEY" >> $GITHUB_ENV
      
      - name: Run data ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          BOK_API_KEY: ${{ secrets.BOK_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          GITHUB_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          source .venv/bin/activate
          python scripts/ingest_api.py
      
      - name: Upload spec CSV to storage
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          source .venv/bin/activate
          python -c "
          from adapters.adapter_database import upload_spec_csv_to_storage
          from pathlib import Path
          import sys
          
          spec_file = Path('src/spec/001_initial_spec.csv')
          if spec_file.exists():
              try:
                  url = upload_spec_csv_to_storage(str(spec_file))
                  print(f'✅ Uploaded spec CSV to storage: {url}')
              except Exception as e:
                  print(f'⚠️  Failed to upload spec CSV: {e}')
                  sys.exit(0)  # Don't fail workflow if upload fails
          else:
              print('⚠️  Spec file not found, skipping upload')
          "
        continue-on-error: true
      
      - name: Validate vintage status
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          source .venv/bin/activate
          python -c "
          from database import get_latest_vintage_id, get_vintage
          from scripts.utils import get_db_client
          
          client = get_db_client()
          # Try 'completed' first, then 'partial'
          vintage_id = get_latest_vintage_id(status='completed', client=client)
          if not vintage_id:
              vintage_id = get_latest_vintage_id(status='partial', client=client)
          if vintage_id:
              vintage_info = get_vintage(vintage_id=vintage_id, client=client)
              if vintage_info:
                  status = vintage_info.get('fetch_status', 'unknown')
                  print(f'✅ Latest vintage {vintage_id} status: {status}')
                  if status not in ['completed', 'partial']:
                      print(f'⚠️  Warning: Vintage status is {status}, expected completed or partial')
              else:
                  print('⚠️  Could not retrieve vintage info')
          else:
              print('⚠️  No vintage found')
          "
        continue-on-error: true

  train:
    needs: ingest
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e .[hydra,database]
          uv pip install hydra-core>=1.3.0 omegaconf>=2.3.0
      
      - name: Load environment variables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" >> $GITHUB_ENV
          echo "SUPABASE_SECRET_KEY=$SUPABASE_SECRET_KEY" >> $GITHUB_ENV
      
      - name: Train DFM model
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          source .venv/bin/activate
          CONFIG_NAME="${{ inputs.config_name }}"
          SERIES_CONFIG="${{ inputs.series_config }}"
          MAX_ITER="${{ inputs.max_iter }}"
          python scripts/train_dfm.py \
            --config-name=${CONFIG_NAME:-default} \
            series=${SERIES_CONFIG:-default} \
            "data.use_database=true" \
            "data.strict_mode=false" \
            "dfm.max_iter=${MAX_ITER:-100}"
      
      - name: Upload model weights
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: model-weights
          path: |
            ResDFM.pkl
            *.pkl
          retention-days: 30

  nowcast:
    needs: train
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e .[hydra,database]
          uv pip install hydra-core>=1.3.0 omegaconf>=2.3.0
      
      - name: Download model weights
        uses: actions/download-artifact@v4
        with:
          name: model-weights
          path: .
        continue-on-error: true
      
      - name: Load environment variables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" >> $GITHUB_ENV
          echo "SUPABASE_SECRET_KEY=$SUPABASE_SECRET_KEY" >> $GITHUB_ENV
      
      - name: Run nowcasting
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          source .venv/bin/activate
          CONFIG_NAME="${{ inputs.config_name }}"
          SERIES_CONFIG="${{ inputs.series_config }}"
          python scripts/nowcast_dfm.py \
            --config-name=${CONFIG_NAME:-default} \
            series=${SERIES_CONFIG:-default} \
            "data.use_database=true" \
            "data.strict_mode=false"

