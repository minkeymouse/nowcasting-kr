name: Nowcast

on:
  workflow_dispatch:
    inputs:
      config_name:
        description: 'Hydra config name'
        required: false
        default: 'test'
      series_config:
        description: 'Series config name'
        required: false
        default: 'test_series'
      period:
        description: 'Forecast period'
        required: false
        default: '2'

jobs:
  nowcast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-hydra.txt
          pip install -r requirements-database.txt
      
      - name: Check for model weights in storage
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          python -c "
          from app.adapters.adapter_database import download_model_weights_from_storage
          from app.database.client import get_client
          client = get_client()
          try:
              weights = download_model_weights_from_storage('model_weights', client=client)
              if weights:
                  print('✅ Model weights found in storage')
              else:
                  print('⚠️  Model weights not found - train job must run first')
          except Exception as e:
              print(f'⚠️  Could not verify model weights: {e}')
          "
      
      - name: Run nowcasting
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          CONFIG_NAME="${{ inputs.config_name }}"
          SERIES_CONFIG="${{ inputs.series_config }}"
          PERIOD="${{ inputs.period }}"
          CMD="python -m app.jobs.nowcast --config-name=${CONFIG_NAME:-test} series=${SERIES_CONFIG:-test_series} data.use_database=true data.strict_mode=false"
          if [ -n "$PERIOD" ]; then
            CMD="$CMD data.forecast_periods=$PERIOD"
          fi
          eval $CMD
      
      - name: Validate nowcasts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          python -c "
          from datetime import datetime, timedelta
          from app.database.client import get_client
          from app.database.operations import get_latest_forecasts
          client = get_client()
          forecasts = get_latest_forecasts(client=client, limit=10)
          if not forecasts.empty:
              recent = forecasts[forecasts['created_at'] > datetime.now() - timedelta(hours=1)]
              print(f'✅ Found {len(recent)} recent nowcast(s)')
          else:
              print('⚠️  No nowcasts found')
          "

