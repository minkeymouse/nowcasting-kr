name: Nowcast DFM

on:
  workflow_dispatch:
    inputs:
      config_name:
        description: 'Hydra config name (e.g., default, test)'
        required: false
        default: 'default'
        type: string
      series_config:
        description: 'Series config name (e.g., default, test_series)'
        required: false
        default: 'default'
        type: string
      series:
        description: 'Target series ID for nowcasting'
        required: false
        default: 'BOK_200Y106_1400'
        type: string
      period:
        description: 'Target period (e.g., 2016q4)'
        required: false
        default: ''
        type: string

jobs:
  nowcast:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          source .venv/bin/activate
          # Install dfm-python package with optional dependencies
          uv pip install -e .[hydra,database]
          # Install application-specific dependencies
          uv pip install hydra-core>=1.3.0 omegaconf>=2.3.0
      
      - name: Download model weights (optional)
        uses: actions/download-artifact@v4
        with:
          name: model-weights
          path: .
        continue-on-error: true
      
      - name: Load environment variables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" >> $GITHUB_ENV
          echo "SUPABASE_SECRET_KEY=$SUPABASE_SECRET_KEY" >> $GITHUB_ENV
      
      - name: Run nowcasting
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          source .venv/bin/activate
          CMD="python scripts/nowcast_dfm.py --config-name=${{ inputs.config_name }} series=${{ inputs.series_config }} data.use_database=true data.strict_mode=false"
          if [ -n "${{ inputs.series }}" ]; then
            CMD="$CMD series=${{ inputs.series }}"
          fi
          if [ -n "${{ inputs.period }}" ]; then
            CMD="$CMD period=${{ inputs.period }}"
          fi
          eval $CMD
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nowcast-logs
          path: |
            *.log
            outputs/**/*.log
          retention-days: 7

