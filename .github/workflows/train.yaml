name: Train DFM Model

on:
  workflow_dispatch:
    inputs:
      config_name:
        description: 'Hydra config name'
        required: false
        default: 'test'
      series_config:
        description: 'Series config name'
        required: false
        default: 'test_series'
      max_iter:
        description: 'Maximum iterations'
        required: false
        default: '100'

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-hydra.txt
          pip install -r requirements-database.txt
      
      - name: Wait for latest vintage
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          python -c "
          import time
          from app.database import get_latest_vintage_id
          from app.database.client import get_client
          client = get_client()
          for i in range(30):
              vintage_id = get_latest_vintage_id(client=client)
              if vintage_id:
                  print(f'✅ Vintage {vintage_id} ready')
                  break
              print(f'Waiting for vintage... ({i+1}/30)')
              time.sleep(10)
          "
      
      - name: Train DFM model
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          CONFIG_NAME="${{ inputs.config_name }}"
          SERIES_CONFIG="${{ inputs.series_config }}"
          MAX_ITER="${{ inputs.max_iter }}"
          python -m app.jobs.train \
            --config-name=${CONFIG_NAME:-test} \
            series=${SERIES_CONFIG:-test_series} \
            "data.use_database=true" \
            "data.strict_mode=false" \
            "dfm.max_iter=${MAX_ITER:-100}"
      
      - name: Validate model weights
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          python -c "
          from app.adapters.adapter_database import download_model_weights_from_storage
          from app.database.client import get_client
          client = get_client()
          try:
              weights = download_model_weights_from_storage('model_weights', client=client)
              if weights:
                  print('✅ Model weights found in storage')
              else:
                  print('⚠️  Model weights not found')
          except Exception as e:
              print(f'⚠️  Could not verify model weights: {e}')
          "

